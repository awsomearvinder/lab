interfaces {
    ethernet eth0 {
        address dhcp
        description WAN
        hw-id 00:15:5d:01:af:01
    }
    ethernet eth1 {
        address 192.168.2.1/24
        description LAN
        hw-id 00:15:5d:01:af:02
    }
    loopback lo {
    }
}
service {
    dhcp-server {
        shared-network-name LAN {
            authoritative {
            }
            subnet 192.168.2.0/24 {
                default-router 192.168.2.1
                domain-name arvinderd.com
                lease 86400
                name-server 192.168.2.1
                range 0 {
                    start 192.168.2.2
                    stop 192.168.2.100
                }
            }
        }
    }
    dns {
        forwarding {
            allow-from 192.168.2.0/24
            cache-size 0
            listen-address 192.168.2.1
        }
    }
    ssh {
        port 22
    }
}
system {
    config-management {
        commit-revisions 100
    }
    conntrack {
        modules {
            ftp
            h323
            nfs
            pptp
            sip
            sqlnet
            tftp
        }
    }
    console {
        device ttyS0 {
            speed 115200
        }
    }
    host-name vyos
    login {
        user vyos {
            authentication {
                public-keys bender {
                    key AAAAC3NzaC1lZDI1NTE5AAAAIMztLpThvXPu85+kGuD/OVdpUNAXbPpYtcPUIyU96PU1
                    type ssh-ed25519
                }
            }
        }
    }
    syslog {
        global {
            facility all {
                level info
            }
            facility protocols {
                level debug
            }
        }
    }
    name-server 1.1.1.1
}
